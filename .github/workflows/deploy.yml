name: Deploy

on:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        run: supabase db push --project-ref xvwpvhbiiwhdeimxxgxg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-notice:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Deploy triggered
        run: echo "Railway and Vercel auto-deploy from main. Migrations applied."

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet
        run: cd backend && go vet ./...
      - name: Test with coverage
        run: |
          cd backend && go test \
            ./internal/transport/http/... \
            ./internal/middleware/... \
            -coverprofile=coverage.out -covermode=atomic
      - name: Check per-file coverage (≥80% each)
        run: |
          python3 - backend/coverage.out <<'EOF'
          import sys

          coverage_file = sys.argv[1]
          covered = {}
          total = {}

          with open(coverage_file) as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('mode:') or not line:
                      continue
                  parts = line.rsplit(' ', 2)
                  if len(parts) != 3:
                      continue
                  loc, nstmt, count = parts
                  file = loc.split(':')[0]
                  n = int(nstmt)
                  c = int(count)
                  total[file] = total.get(file, 0) + n
                  covered[file] = covered.get(file, 0) + (n if c > 0 else 0)

          THRESHOLD = 80.0
          failed = []

          for f in sorted(total):
              pct = 100.0 * covered[f] / total[f] if total[f] else 0
              short = f.split('/')[-1]
              mark = '✓' if pct >= THRESHOLD else '✗'
              print(f'  {mark} {pct:5.1f}%  {short}')
              if pct < THRESHOLD:
                  failed.append((short, pct))

          if failed:
              print()
              for name, pct in failed:
                  print(f'::error::Coverage {pct:.1f}% in {name} is below {THRESHOLD:.0f}% threshold')
              sys.exit(1)
          EOF
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.out

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Test
        run: cd frontend && npm test -- --run
      - name: Build
        run: cd frontend && npm run build

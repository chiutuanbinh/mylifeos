name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet
        run: cd backend && go vet ./...
      - name: Test with coverage
        # Exclude packages that require a live DB (repo, migrate) and the binary entrypoint (cmd/server).
        # Coverage is enforced on handlers and middleware — the pure-logic packages with unit tests.
        run: |
          cd backend && go test \
            ./internal/handlers/... \
            ./internal/middleware/... \
            -coverprofile=coverage.out -covermode=atomic
      - name: Check coverage threshold (≥80%)
        run: |
          COVERAGE=$(cd backend && go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.out

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Test
        run: cd frontend && npm test -- --run
      - name: Build
        run: cd frontend && npm run build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mylifeos
      POSTGRES_PASSWORD: mylifeos
      POSTGRES_DB: mylifeos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mylifeos"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: mylifeos
    volumes:
      - ./migrations:/migrations
    command: >
      sh -c "for f in $(ls /migrations/*.sql | sort); do psql -h postgres -U mylifeos -d mylifeos -f $$f; done"
    profiles: ["migrate"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file: .env.local
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file: .env.local
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
